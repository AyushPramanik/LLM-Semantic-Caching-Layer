name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.2.0-v9
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/15
      EMBEDDING_PROVIDER: fake
      VECTOR_BACKEND: memory
      COMPLETER_BACKEND: echo
      OPENAI_API_KEY: sk-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Unit + integration tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 -m "not load"

      - name: Load/convergence tests
        run: pytest -m load
